###############################################
# Nginx - live.vismartlearningeducation.com
# MediaMTX WHIP/WHEP + HLS + RTSP proxy
###############################################

# WebRTC WHIP/WHEP endpoint (teacher publish + student WebRTC play)
# HLS endpoint (student HLS playback)
server {
    listen 443 ssl http2;
    server_name live.vismartlearningeducation.com;

    ssl_certificate /etc/letsencrypt/live/live.vismartlearningeducation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.vismartlearningeducation.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    # WebRTC WHIP (publish) + WHEP (play) via API port 8889
    location ~ ^/live/(.+)/whip$ {
        proxy_pass http://127.0.0.1:8889/live/$1/whip;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebRTC requires longer timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
    }

    location ~ ^/live/(.+)/whep$ {
        proxy_pass http://127.0.0.1:8889/live/$1/whep;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
    }

    # HLS playback (MediaMTX port 8888)
    location /live/ {
        proxy_pass http://127.0.0.1:8888/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for video player
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # HLS caching
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # CORS origin for HLS.js
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range";
    }

    # MediaMTX API (for monitoring)
    location /v3/ {
        proxy_pass http://127.0.0.1:9997/v3/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Basic auth for API
        auth_basic "MediaMTX API";
        auth_basic_user_file /etc/nginx/.htpasswd-mtx;
    }

    # Default: proxy to MediaMTX RTSP port (for RTSP fallback)
    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name live.vismartlearningeducation.com;
    return 301 https://$host$request_uri;
}
