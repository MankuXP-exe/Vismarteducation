###############################################
# Nginx - stream.vismartlearningeducation.com
# Recordings + Thumbnails + Notes static files
###############################################

server {
    listen 443 ssl http2;
    server_name stream.vismartlearningeducation.com;

    ssl_certificate /etc/letsencrypt/live/stream.vismartlearningeducation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.vismartlearningeducation.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10G;

    # Recordings - direct MP4 playback
    location /recordings/ {
        alias /opt/vi-smart/recordings/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        autoindex off;

        # Enable video seeking in browsers
        location ~* \.mp4$ {
            add_header Accept-Ranges bytes;
        }

        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* \.ts$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Thumbnails
    location /thumbnails/ {
        alias /opt/vi-smart/thumbnails/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*" always;
        autoindex off;
    }

    # Notes / PDFs
    location /notes/ {
        alias /opt/vi-smart/notes/;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com" always;
        autoindex off;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name stream.vismartlearningeducation.com;
    return 301 https://$host$request_uri;
}
