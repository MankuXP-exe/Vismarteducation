server {
    server_name api.vismartlearningeducation.com;

    client_max_body_size 10G;

    location /concession-docs/ {
        alias /var/www/uploads/concessions/;
        internal;
        add_header Cache-Control "private, no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "default-src 'none'; sandbox";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.vismartlearningeducation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vismartlearningeducation.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name stream.vismartlearningeducation.com;

    location /recordings/ {
        alias /opt/vi-smart/recordings/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        autoindex off;
    }

    location /vps-recordings/ {
        alias /opt/vi-smart/recordings/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        autoindex off;
    }

    location /thumbnails/ {
        alias /opt/vi-smart/thumbnails/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        autoindex off;
    }

    location /uploads/materials/ {
        alias /opt/vi-smart/uploads/materials/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        valid_referers vismartlearningeducation.com www.vismartlearningeducation.com api.vismartlearningeducation.com stream.vismartlearningeducation.com none blocked;
        if ($invalid_referer) { return 403; }
    }

    location /notes/ {
        alias /opt/vi-smart/notes/;
        add_header Cache-Control "public, max-age=3600";
        valid_referers vismartlearningeducation.com www.vismartlearningeducation.com stream.vismartlearningeducation.com none blocked;
        if ($invalid_referer) { return 403; }
        autoindex off;
    }

    location /live/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_redirect /live/ /live/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    }

    location /recorded/ {
        alias /opt/vi-smart/recordings/;
        add_header Accept-Ranges bytes;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "https://vismartlearningeducation.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.vismartlearningeducation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vismartlearningeducation.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name live.vismartlearningeducation.com;

    location / {
        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100m;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.vismartlearningeducation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vismartlearningeducation.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.vismartlearningeducation.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.vismartlearningeducation.com;
    return 404;
}

server {
    if ($host = stream.vismartlearningeducation.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name stream.vismartlearningeducation.com;
    return 404;
}

server {
    if ($host = live.vismartlearningeducation.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name live.vismartlearningeducation.com;
    return 404;
}
