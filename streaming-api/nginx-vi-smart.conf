server {
    listen 80;
    server_name api.vismart.com;

    client_max_body_size 10G;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 80;
    server_name stream.vismart.com;

    location /recordings/ {
        alias /opt/vi-smart/recordings/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "https://vismart.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        autoindex off;
    }

    location /thumbnails/ {
        alias /opt/vi-smart/thumbnails/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        autoindex off;
    }

    location /notes/ {
        alias /opt/vi-smart/notes/;
        add_header Cache-Control "public, max-age=3600";
        valid_referers vismart.com www.vismart.com;
        if ($invalid_referer) { return 403; }
        autoindex off;
    }
}

server {
    listen 80;
    server_name live.vismart.com;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
