server {
    listen 80;
    server_name cdn.yourdomain.com api.yourdomain.com;

    # HLS Streaming configuration
    location /recordings/ {
        # Secure Link Configuration
        secure_link $arg_md5,$arg_expires;
        secure_link_md5 "secure-link-secret$uri$arg_expires";

        if ($secure_link = "") {
            return 403; # Invalid hash
        }
        if ($secure_link = "0") {
            return 410; # Expired
        }

        alias /var/videos/recordings/;
        
        # CORS Setup
        add_header 'Access-Control-Allow-Origin' 'https://yourwebsite.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Video optimization headers
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control no-cache;
        autoindex off;
    }

    # API Proxy
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
